version: "3.9"

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: career_agent
      POSTGRES_USER: career
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/shared/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: career
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.17.0
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Services ────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-gateway
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JOB_DISCOVERY_URL: http://job-discovery:5001
      JOB_INTELLIGENCE_URL: http://job-intelligence:5002
      RESUME_GENERATOR_URL: http://resume-generator:5003
      APPLICATION_AUTOMATION_URL: http://application-automation:5004
      NOTIFICATIONS_URL: http://notifications:5005
      CRAWL_ENGINE_URL: http://crawl-engine:5006
      DATA_PIPELINE_URL: http://data-pipeline:5007
      KNOWLEDGE_GRAPH_URL: http://knowledge-graph:5008
      DECISION_ENGINE_URL: http://decision-engine:5009
      PREDICTIVE_AI_URL: http://predictive-ai:5010
      LINKEDIN_AUTOMATION_URL: http://linkedin-automation:5011
      VOICE_AI_URL: http://voice-ai:5012
      INTERVIEW_AI_URL: http://interview-ai:5013
      NEGOTIATION_AI_URL: http://negotiation-ai:5014
      FREELANCE_BIDDING_URL: http://freelance-bidding:5015
      DEMAND_GENERATION_URL: http://demand-generation:5016
      AGENT_ORCHESTRATOR_URL: http://agent-orchestrator:5017
      SUBSCRIPTION_URL: http://subscription:5018
      MARKETPLACE_URL: http://marketplace:5019
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JSEARCH_API_KEY: ${JSEARCH_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      WHATSAPP_TO_NUMBER: ${WHATSAPP_TO_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  job-discovery:
    build:
      context: .
      dockerfile: Dockerfile
      target: job-discovery
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  job-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
      target: job-intelligence
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  resume-generator:
    build:
      context: .
      dockerfile: Dockerfile
      target: resume-generator
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/3
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  application-automation:
    build:
      context: .
      dockerfile: Dockerfile
      target: application-automation
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/4
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      RESUME_GENERATOR_URL: http://resume-generator:5003
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      resume-generator:
        condition: service_started

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      target: notifications
    ports:
      - "5005:5005"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/5
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── New Services ────────────────────────────────────────────────────────────
  crawl-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: crawl-engine
    ports:
      - "5006:5006"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/6
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  data-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      target: data-pipeline
    ports:
      - "5007:5007"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/7
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JOB_INTELLIGENCE_URL: http://job-intelligence:5002
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  knowledge-graph:
    build:
      context: .
      dockerfile: Dockerfile
      target: knowledge-graph
    ports:
      - "5008:5008"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/8
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  decision-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: decision-engine
    ports:
      - "5009:5009"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/9
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      RESUME_GENERATOR_URL: http://resume-generator:5003
      APPLICATION_AUTOMATION_URL: http://application-automation:5004
      KNOWLEDGE_GRAPH_URL: http://knowledge-graph:5008
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Blackhole Services ──────────────────────────────────────────────────────
  predictive-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: predictive-ai
    ports:
      - "5010:5010"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/10
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  linkedin-automation:
    build:
      context: .
      dockerfile: Dockerfile
      target: linkedin-automation
    ports:
      - "5011:5011"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/11
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  voice-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: voice-ai
    ports:
      - "5012:5012"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/12
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  interview-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: interview-ai
    ports:
      - "5013:5013"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/13
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  negotiation-ai:
    build:
      context: .
      dockerfile: Dockerfile
      target: negotiation-ai
    ports:
      - "5014:5014"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/14
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  freelance-bidding:
    build:
      context: .
      dockerfile: Dockerfile
      target: freelance-bidding
    ports:
      - "5015:5015"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/15
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  demand-generation:
    build:
      context: .
      dockerfile: Dockerfile
      target: demand-generation
    ports:
      - "5016:5016"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/16
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  agent-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent-orchestrator
    ports:
      - "5017:5017"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/17
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JOB_DISCOVERY_URL: http://job-discovery:5001
      JOB_INTELLIGENCE_URL: http://job-intelligence:5002
      RESUME_GENERATOR_URL: http://resume-generator:5003
      APPLICATION_AUTOMATION_URL: http://application-automation:5004
      LINKEDIN_AUTOMATION_URL: http://linkedin-automation:5011
      VOICE_AI_URL: http://voice-ai:5012
      INTERVIEW_AI_URL: http://interview-ai:5013
      NEGOTIATION_AI_URL: http://negotiation-ai:5014
    depends_on:
      postgres:
        condition: service_healthy

  subscription:
    build:
      context: .
      dockerfile: Dockerfile
      target: subscription
    ports:
      - "5018:5018"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      REDIS_URL: redis://redis:6379/18
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  marketplace:
    build:
      context: .
      dockerfile: Dockerfile
      target: marketplace
    ports:
      - "5019:5019"
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      REDIS_URL: redis://redis:6379/19
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Web Frontend ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      API_BACKEND_URL: http://api-gateway:5000
    depends_on:
      - api-gateway

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      DATABASE_URL_SYNC: postgresql://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      CRAWL_ENGINE_URL: http://crawl-engine:5006
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JSEARCH_API_KEY: ${JSEARCH_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      WHATSAPP_TO_NUMBER: ${WHATSAPP_TO_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      DATABASE_URL_SYNC: postgresql://career:${POSTGRES_PASSWORD:-changeme}@postgres:5432/career_agent
      RABBITMQ_URL: amqp://career:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  qdrant_data:
  neo4j_data:
